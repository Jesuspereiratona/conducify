<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conducify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/estilos.css">
</head>
<body>
    <div class="container py-4">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h1 class="display-6 fw-bold">Conducify</h1>
                <p class="text-muted mb-3">Explora conductores, automóviles y sus relaciones desde una interfaz simple y amigable.</p>
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-primary" id="btn-todos">Cargar todo</button>
                    <button class="btn btn-outline-primary" id="btn-conductores">Conductores</button>
                    <button class="btn btn-outline-primary" id="btn-automoviles">Automóviles</button>
                    <button class="btn btn-outline-primary" id="btn-sin-auto">Conductores sin auto</button>
                    <button class="btn btn-outline-primary" id="btn-solitos">Solitos</button>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-lg-6">
                <div class="card h-100">
                    <div class="card-body">
                        <h2 class="h5">Buscar auto por patente</h2>
                        <form id="form-auto" class="row g-2">
                            <div class="col-md-8">
                                <input id="patente" class="form-control" type="text" placeholder="Ej: ABC123" required>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-success w-100" type="submit">Buscar</button>
                            </div>
                        </form>
                        <div id="resultado-auto" class="mt-3"></div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card h-100">
                    <div class="card-body">
                        <h2 class="h5">Resultados</h2>
                        <div id="estado" class="alert alert-info mb-3">Selecciona una opción para ver los datos.</div>
                        <div id="resultados"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./assets/js/app.js"></script>
</body>
</html>
